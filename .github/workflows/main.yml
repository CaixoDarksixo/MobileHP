name: Android CI - Lint & Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Lint, Test and Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Configura o Java (JDK 17 recomendado para Android recente)
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Dá permissão para o script do Gradle
      - name: Conceder permissão de execução para o gradlew
        run: chmod +x gradlew

      # 4. Roda o Lint nativo do Android Studio
      - name: Rodar Android Lint
        run: ./gradlew lintDebug

      # 5. Roda o Ktlint (verifica espaçamento, formatação e estilo Kotlin)
      # Ele baixa a CLI do ktlint e roda nos seus arquivos .kt
      - name: Rodar Ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.2.1/ktlint
          chmod a+x ktlint
          ./ktlint "app/src/**/*.kt"

      # 6. Compila e gera o aplicativo em modo Debug
      - name: Gerar APK (Debug)
        run: ./gradlew assembleDebug

      # 7. Pega o .apk gerado e salva como um artefato baixável no GitHub
      - name: Upload do APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          # O artefato ficará disponível por 30 dias por padrão
